[workspace]
name = "pixi-envs"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
seal = { cmd = "nimvault seal", description = "Encrypt all vault-tracked files" }
unseal = { cmd = "nimvault unseal", description = "Decrypt all vault-tracked files" }
vault-list = { cmd = "nimvault list", description = "List all vault entries" }
vault-status = { cmd = "nimvault status", description = "Show sync status of vault entries" }
