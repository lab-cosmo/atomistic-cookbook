channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    - "pyeonclient[models]>=0.3.3,<0.4"
    - "eon-schema>=0.2.1,<0.3"
    - "rgpot>=2.4.2,<3"
    - torch>=2.9,<2.14
    - ase>=3.23,<4
    - matplotlib
    # rgpycrumbs.eon.plot_neb imports adjustText at module load
    - "adjustText>=1.0"
    - metatrain>=2026.3.1,<2027
    - requests
    - metatomic-ase
    - "readcon>=0.13.1,<0.14"
    # 1.10.3 miswired Click onto plot_*_from_settings (library kwargs → argv)
    - "rgpycrumbs>=1.10.4"
    - "chemparseplot[neb,plot]>=1.9.14,<2"
    # strip_renderer="xyzrender" needs the xyzrender CLI on PATH
    - "xyzrender>=0.1.3"
    # grad_imq / gradient-enhanced surface fits (chemparseplot landscape)
    - "jax[cpu]>=0.4"
    - atomistic-cookbook-utils >=0.1,<0.2
