channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    - "pyeonclient[models]>=0.3.3,<0.4"
    - "eon-schema>=0.2.1,<0.3"
    - "rgpot>=2.4.2,<3"
    - torch>=2.9,<2.14
    - ase>=3.23,<4
    - matplotlib
    - metatrain>=2026.3.1,<2027
    - requests
    - metatomic-ase
    - "readcon>=0.13.1,<0.14"
    # 1.10.3 miswired Click onto plot_*_from_settings (library kwargs → argv)
    - "rgpycrumbs>=1.10.8"  # library plot enables AUTO_DEPS (no host jax pin)
    # jax / adjustText / xyzrender / chemparseplot: lazy via
    # RGPYCRUMBS_AUTO_DEPS + ensure_import (rgpycrumbs>=1.10.8)
    - atomistic-cookbook-utils >=0.1,<0.2
