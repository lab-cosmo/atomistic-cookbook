channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    # pyeonclient[models] pulls eon-schema; plot stack via rgpycrumbs ensure_import + uv.
    # 0.3.5+ declares rgpot / vesin>=0.6 (VesinOptions ABI); floor rgpot to PyPI tip.
    - "pyeonclient[models]>=0.3.5,<0.4"
    - "rgpot>=2.5.4,<3"
    - "vesin>=0.6.0"
    # rgpot 2.5.4 multi-ABI engines cover torch 2.7–2.13; floor 2.10, cap <2.14.
    - torch>=2.10,<2.14
    - ase>=3.23,<4
    - matplotlib
    - metatrain>=2026.3.1,<2027
    - requests
    - metatomic-ase
    - "readcon>=0.13.1,<0.14"
    - "rgpycrumbs>=1.10.10,<2"
    - atomistic-cookbook-utils >=0.1,<0.2
