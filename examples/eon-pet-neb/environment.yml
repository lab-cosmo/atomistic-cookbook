channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    # In-process eOn client + shared schema (upper bounds for gallery stability).
    - "pyeonclient[models]>=0.3.2,<0.4"
    - "eon-schema>=0.2.1,<0.3"
    - "rgpot>=2.4.2,<3"
    - torch>=2.9,<2.14
    - ase>=3.23,<4
    - matplotlib
    - metatrain>=2026.3.1,<2027
    - requests
    - metatomic-ase
    - "readcon>=0.13.1,<0.14"
    # NEB/min plots: in-process chemparseplot + rgpycrumbs (no CLI/uv subprocess).
    - "rgpycrumbs>=1.9.16,<1.9.21"
    # 1.9.13+ fixes SurfaceFitConfig NameError on Py3.13 (1.9.10–1.9.12 broken).
    - "chemparseplot[neb,plot]>=1.9.13,<2"
    - "xyzrender>=0.1.3"
    - "adjustText>=1.0"
    - "cmcrameri"
    - "polars"
    - "jax"
    - "h5py"
    - "rich"
    - atomistic-cookbook-utils >=0.1,<0.2
