channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  # Client via pip (pyeonclient); no conda-forge eOn / eonclient binary.
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    # pyeonclient 0.3 abi3 wheel + rgpot multi-ABI metatomic engines (torch 2.7+).
    - "pyeonclient>=0.3.1"
    - "rgpot>=2.4.2"
    - torch>=2.9,<2.14
    - ase>=3.23
    - matplotlib
    - metatrain>=2026.3.1
    - requests
    - metatomic-ase
    - "readcon>=0.13.1"
    - "rgpycrumbs>=1.9.16,<1.9.21"
    - atomistic-cookbook-utils >=0.1,<0.2
