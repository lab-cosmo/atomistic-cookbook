channels:
  - metatensor
  - conda-forge
  - https://repo.prefix.dev/rg-forge
dependencies:
  # Client via pip (pyeonclient); no conda-forge eOn / eonclient binary.
  - ira
  - python=3.13
  - pip
  - uv
  - pip:
    # pyeonclient 0.3.2: make_backend, neb_idpp_path, find_extrema, write_neb_results
    # Upper bounds keep the gallery stable across dependency bumps (Luthaf).
    - "pyeonclient[models]>=0.3.2,<0.4"
    - "eon-schema>=0.2.1,<0.3"
    - "rgpot>=2.4.2,<3"
    - torch>=2.9,<2.14
    - ase>=3.23,<4
    - matplotlib
    - metatrain>=2026.3.1,<2027
    - requests
    - metatomic-ase
    - "readcon>=0.13.1,<0.14"
    - "rgpycrumbs>=1.9.16,<1.9.21"
    - atomistic-cookbook-utils >=0.1,<0.2
