channels:
  - metatensor
  - conda-forge
dependencies:
  # 3.11 keeps metatensor-torch 0.7.x (Labels.view for torch-pme TorchScript) installable
  # without falling back to legacy numpy sdist builds that fail on 3.12.
  - python=3.11
  - lammps-metatomic
  - numpy>=1.26
  - pip
  - pip:
    - ase
    - chemiscope>=1.0
    - ipi>=3.2.0
    # torch-pme P3M TorchScript still calls Labels.view; 0.8+ removed it.
    - metatensor-torch>=0.7.1,<0.8
    - metatensor-operations
    - matplotlib
    - metatomic-torch
    - metatomic-ase
    - vesin>=0.5.4
    - vesin-torch>=0.5.4
    - torch-pme>=0.3.1,<0.5
    - atomistic-cookbook-utils >=0.1,<0.2
