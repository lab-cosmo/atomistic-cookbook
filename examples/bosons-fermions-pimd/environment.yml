channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # i-PI 3.2+ ships the engine and the pure-Python `i-pi-py_driver` (with the
      # built-in `harmonic` PES used here), so there is no Fortran to compile and
      # no separate driver to install. The recipe invokes `i-pi` and
      # `i-pi-py_driver` as command-line tools; it does not import the package.
      - ipi>=3.2.0,<4
      - numpy>=1.22
      - matplotlib>=3.5
