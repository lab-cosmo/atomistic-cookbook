channels:
  - metatensor
  - conda-forge
dependencies:
  - chemiscope
  - metatensor::gromacs-metatomic=*=mpi_*
  # gromacs-metatomic links libgromacs against libopenblas.so.0 but the recipe
  # does not list it as a runtime dependency; pin it here so gmx_mpi can load.
  - libopenblas
  - libtorch =*=cpu*
  - pytorch-cpu
  - matplotlib
  - mdanalysis
  - python=3.12
  - pip
  - uv
  - pip:
    - torch>=2.7,<2.8
    - ase>=3.23
    - cmcrameri
    - metatrain
    - metatomic-torch
