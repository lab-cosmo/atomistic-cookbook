# Build (and on tag, publish) the atomistic-cookbook-utils package.
#
# - On pushes to any `utils-v*` tag: build sdist + wheel and publish to PyPI
#   using Trusted Publishing (OIDC). Configure the publisher at
#   https://pypi.org/manage/account/publishing/ pointing at this workflow
#   and the `pypi` environment.
# - On pull requests that touch the package or this workflow: build only
#   (no upload) as a smoke test.
name: Publish atomistic-cookbook-utils

on:
  push:
    tags:
      - 'utils-v*'
  pull_request:
    paths:
      - 'src/atomistic-cookbook-utils/**'
      - '.github/workflows/publish-utils.yml'

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: src/atomistic-cookbook-utils
        run: python -m build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: src/atomistic-cookbook-utils/dist/

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with test deps
        working-directory: src/atomistic-cookbook-utils
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run pytest
        working-directory: src/atomistic-cookbook-utils
        run: pytest -q

  publish:
    name: Publish to PyPI
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/utils-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish-utils
      url: https://pypi.org/p/atomistic-cookbook-utils
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
